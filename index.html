<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b2942" />
    <title>Quack &amp; Catch</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b2942;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
        touch-action: none;
      }
      .fatal {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 2rem;
        text-align: center;
        color: #e8eef4;
      }
      .fatal h1 {
        margin: 0;
        font-size: 1.6rem;
      }
      .fatal p {
        margin: 0;
        max-width: 28rem;
        opacity: 0.85;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
